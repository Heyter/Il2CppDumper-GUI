name: Build GUI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Empty = build-<run_number>'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x86
            arch: x86
          - rid: win-x64
            arch: x64

    env:
      PROJECT_PATH: Il2CppDumper/Il2CppDumper.csproj
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net10.0-windows

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve metadata
        id: meta
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "build-${{ github.run_number }}"
          }

          $publishDir = Join-Path $env:RUNNER_TEMP "publish\${{ matrix.rid }}"
          $zipName = "Il2CppDumper-GUI-${{ matrix.rid }}-$tag.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "publish_dir=$publishDir" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish $env:PROJECT_PATH
          -c $env:CONFIGURATION
          -f $env:TARGET_FRAMEWORK
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          --no-restore
          -o "${{ steps.meta.outputs.publish_dir }}"

      - name: Create zip
        run: |
          $publishDir = "${{ steps.meta.outputs.publish_dir }}"
          $zipPath = "${{ steps.meta.outputs.zip_path }}"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: ${{ steps.meta.outputs.zip_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Resolve metadata
        id: meta
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "build-${{ github.run_number }}"
          }

          $bundleZip = Join-Path $env:RUNNER_TEMP "Il2CppDumper-GUI-win-x86-win-x64-$tag.zip"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "bundle_zip=$bundleZip" >> $env:GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}\release-assets

      - name: Create bundle zip
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP "release-assets"
          $bundleDir = Join-Path $env:RUNNER_TEMP "bundle"
          $bundleZip = "${{ steps.meta.outputs.bundle_zip }}"

          if (Test-Path $bundleDir) {
            Remove-Item $bundleDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $bundleDir | Out-Null

          Get-ChildItem -Path $downloadRoot -Recurse -Filter *.zip |
            Copy-Item -Destination $bundleDir -Force

          if (Test-Path $bundleZip) {
            Remove-Item $bundleZip -Force
          }

          Compress-Archive -Path (Join-Path $bundleDir '*') -DestinationPath $bundleZip -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: Il2CppDumper-GUI-win-x86-win-x64-${{ steps.meta.outputs.tag }}.zip
          path: ${{ steps.meta.outputs.bundle_zip }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.tag }}"

          $assets = @(Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "release-assets") -Recurse -Filter *.zip | ForEach-Object { $_.FullName })
          $assets += "${{ steps.meta.outputs.bundle_zip }}"

          gh release view $tag --repo $repo *> $null
          $exists = $LASTEXITCODE -eq 0

          if (-not $exists) {
            $args = @(
              "release", "create", $tag,
              "--repo", $repo,
              "--title", $tag,
              "--generate-notes"
            )
            $args += $assets
            gh @args
          }
          else {
            $args = @(
              "release", "upload", $tag,
              "--repo", $repo,
              "--clobber"
            )
            $args += $assets
            gh @args
          }