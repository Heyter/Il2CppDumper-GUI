name: Build Launcher Bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Empty = build-<run_number>'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-inner:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x86
            folder: bin32bit
          - rid: win-x64
            folder: bin64bit

    env:
      PROJECT_PATH: Il2CppDumper/Il2CppDumper.csproj
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net10.0-windows

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish inner app
        run: >
          dotnet publish $env:PROJECT_PATH
          -c $env:CONFIGURATION
          -f $env:TARGET_FRAMEWORK
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o "${{ runner.temp }}\${{ matrix.folder }}"

      - name: Remove duplicated config from inner app
        run: |
          $configPath = Join-Path "${{ runner.temp }}\${{ matrix.folder }}" "config.json"
          if (Test-Path $configPath) {
            Remove-Item $configPath -Force
          }

      - name: Upload inner artifact
        uses: actions/upload-artifact@v4
        with:
          name: inner-${{ matrix.folder }}
          path: ${{ runner.temp }}\${{ matrix.folder }}
          if-no-files-found: error

  build-launcher:
    runs-on: windows-latest

    env:
      PROJECT_PATH: Launcher/Launcher.csproj
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net10.0-windows
      RUNTIME: win-x86

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish launcher
        run: >
          dotnet publish $env:PROJECT_PATH
          -c $env:CONFIGURATION
          -f $env:TARGET_FRAMEWORK
          -r $env:RUNTIME
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o "${{ runner.temp }}\launcher"

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-root
          path: ${{ runner.temp }}\launcher
          if-no-files-found: error

  package-release:
    needs:
      - build-inner
      - build-launcher
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "build-${{ github.run_number }}"
          }

          $packageDir = Join-Path $env:RUNNER_TEMP "package"
          $zipName = "Il2CppDumper-launcher-bundle-$tag.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "package_dir=$packageDir" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Download launcher artifact
        uses: actions/download-artifact@v4
        with:
          name: launcher-root
          path: ${{ runner.temp }}\download\launcher-root

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: inner-bin32bit
          path: ${{ runner.temp }}\download\bin32bit

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: inner-bin64bit
          path: ${{ runner.temp }}\download\bin64bit

      - name: Assemble bundle
        run: |
          $packageDir = "${{ steps.meta.outputs.package_dir }}"
          $launcherDir = "${{ runner.temp }}\download\launcher-root"
          $bin32Src = "${{ runner.temp }}\download\bin32bit"
          $bin64Src = "${{ runner.temp }}\download\bin64bit"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageDir "bin32bit") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageDir "bin64bit") | Out-Null

          Copy-Item (Join-Path $launcherDir "*") -Destination $packageDir -Recurse -Force
          Copy-Item "Il2CppDumper\config.json" -Destination (Join-Path $packageDir "config.json") -Force

          Copy-Item (Join-Path $bin32Src "*") -Destination (Join-Path $packageDir "bin32bit") -Recurse -Force
          Copy-Item (Join-Path $bin64Src "*") -Destination (Join-Path $packageDir "bin64bit") -Recurse -Force

          Remove-Item (Join-Path $packageDir "bin32bit\config.json") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $packageDir "bin64bit\config.json") -Force -ErrorAction SilentlyContinue

      - name: Create zip
        run: |
          $packageDir = "${{ steps.meta.outputs.package_dir }}"
          $zipPath = "${{ steps.meta.outputs.zip_path }}"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ steps.meta.outputs.tag }}
          path: ${{ steps.meta.outputs.zip_path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.tag }}"
          $zipPath = "${{ steps.meta.outputs.zip_path }}"

          gh release view $tag --repo $repo *> $null
          $exists = $LASTEXITCODE -eq 0

          if (-not $exists) {
            gh release create $tag $zipPath `
              --repo $repo `
              --title $tag `
              --generate-notes
          }
          else {
            gh release upload $tag $zipPath `
              --repo $repo `
              --clobber
          }
